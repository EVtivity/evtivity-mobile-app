# Reusable login. Caller passes EMAIL and PASSWORD via env. Assumes the login
# screen is already showing (run ensure-logged-out first).
appId: com.evtivity.driver
---
- tapOn:
    id: "login-email"
- inputText: ${EMAIL}
- tapOn:
    id: "login-password"
- inputText: ${PASSWORD}
# No hideKeyboard: on iOS the dismiss animation races the Sign In tap (the button
# disables + shows a spinner the moment login starts). The button sits above the
# keyboard, so tap it directly.
- tapOn:
    id: "login-submit"
