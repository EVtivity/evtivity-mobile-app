# Relaunch the app and guarantee we land on the login screen, regardless of the
# state the previous flow left behind (logged in, or parked on register/forgot).
appId: com.evtivity.driver
---
- launchApp
# Let the splash/first screen settle so the relaunch does not race the taps.
- waitForAnimationToEnd
# Logged in: the tab bar is present -> sign out from the Account tab.
- runFlow:
    when:
      visible:
        id: 'tab-account'
    commands:
      - tapOn:
          id: 'tab-account'
      # Wait for the Account screen to render before tapping sign out.
      - assertVisible:
          id: 'account-signout'
      - tapOn:
          id: 'account-signout'
# Parked on Forgot Password: walk back to login.
- runFlow:
    when:
      visible: 'Back to Login'
    commands:
      - tapOn: 'Back to Login'
# Parked on Register: scroll the back-link into view, then walk back to login.
- runFlow:
    when:
      visible: 'Already have an account?'
    commands:
      - scrollUntilVisible:
          element:
            text: 'Already have an account?'
          direction: DOWN
      - tapOn: 'Sign In'
# Sign-out makes a server round-trip before the redirect to login, so wait for
# the login screen rather than asserting it immediately.
- extendedWaitUntil:
    visible:
      id: 'login-email'
    timeout: 15000
