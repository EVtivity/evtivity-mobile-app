# Forgot-password flow: navigate from login, submit an email, see the
# non-revealing confirmation message.
appId: com.evtivity.driver
name: 05 - Forgot password
tags:
  - auth
---
- runFlow: ../subflows/ensure-logged-out.yaml
- tapOn: "Forgot Password?"
- assertVisible: "Enter your email to receive a reset link"
- tapOn:
    id: "forgot-email"
- inputText: "driver@evtivity.local"
- hideKeyboard
- scrollUntilVisible:
    element:
      id: "forgot-submit"
    direction: DOWN
- tapOn:
    id: "forgot-submit"
- extendedWaitUntil:
    visible: "If an account exists with that email, a reset link has been sent."
    timeout: 10000
