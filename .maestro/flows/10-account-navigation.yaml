# Every row on the Account tab opens its screen and returns. Rows are tapped by
# testID (the "Notifications" label also matches the bell-drawer trigger). The
# Account tab is a root with no back button, so a visible back-button proves we
# navigated into a sub-screen.
appId: com.evtivity.driver
name: 10 - Account navigation
tags:
  - account
  - navigation
---
- runFlow: ../subflows/session.yaml
- tapOn:
    id: "tab-account"
- tapOn:
    id: "account-row-personal"
- assertVisible: "Preferences"
- tapOn:
    id: "back-button"
- tapOn:
    id: "account-row-security"
- assertVisible:
    id: "back-button"
- tapOn:
    id: "back-button"
- tapOn:
    id: "account-row-notifications"
- extendedWaitUntil:
    visible: "Email notifications"
    timeout: 8000
- tapOn:
    id: "back-button"
- tapOn:
    id: "account-row-payment"
- assertVisible:
    id: "back-button"
- tapOn:
    id: "back-button"
- tapOn:
    id: "account-row-rfid"
- assertVisible: "Add RFID Card"
- tapOn:
    id: "back-button"
- tapOn:
    id: "account-row-vehicles"
- assertVisible: "Add Vehicle"
- tapOn:
    id: "back-button"
- scrollUntilVisible:
    element:
      id: "account-row-favorites"
    direction: DOWN
- tapOn:
    id: "account-row-favorites"
- assertVisible:
    id: "back-button"
- tapOn:
    id: "back-button"
- scrollUntilVisible:
    element:
      id: "account-row-about"
    direction: DOWN
- tapOn:
    id: "account-row-about"
- assertVisible: "App version"
- tapOn:
    id: "back-button"
- assertVisible:
    id: "account-row-about"
