# A wrong password surfaces the API's invalid-credentials error under the form.
appId: com.evtivity.driver
name: 03 - Login invalid credentials
tags:
  - auth
---
- runFlow: ../subflows/ensure-logged-out.yaml
- runFlow:
    file: ../subflows/login.yaml
    env:
      EMAIL: driver@evtivity.local
      PASSWORD: definitely-wrong-password
- assertVisible: "Invalid email or password"
- assertVisible:
    id: "login-email"
