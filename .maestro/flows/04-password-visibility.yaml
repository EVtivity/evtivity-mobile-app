# The show/hide toggle on a password field flips between reveal and hide states.
# The eye control exposes its state via accessibility label.
appId: com.evtivity.driver
name: 04 - Password visibility toggle
tags:
  - auth
---
- runFlow: ../subflows/ensure-logged-out.yaml
- tapOn:
    id: "login-password"
- inputText: "MySecretPass1"
- hideKeyboard
- assertVisible: "Show password"
- tapOn: "Show password"
- assertVisible: "Hide password"
- tapOn: "Hide password"
- assertVisible: "Show password"
