# Charge tab: search field present, the Scan QR camera screen, and the Roaming
# tab (only when the operator's roaming.enabled feature flag is on).
appId: com.evtivity.driver
name: 20 - Charge search and scan
tags:
  - charge
  - navigation
---
- runFlow: ../subflows/session.yaml
- tapOn:
    id: "tab-charge"
- assertVisible: "Charge"
- assertVisible:
    id: "charge-search"
# scan QR opens the camera screen
- assertVisible:
    id: "charge-scan"
- tapOn:
    id: "charge-scan"
- assertVisible: "Point your camera at the charger QR code"
- tapOn: "Close"
- assertVisible: "Charge"
# roaming tab — only when the operator has OCPI roaming enabled (gated by the
# roaming.enabled feature flag), so the tab may not be present
- runFlow:
    when:
      visible: "Roaming"
    commands:
      - tapOn: "Roaming"
      - assertVisible:
          id: "charge-roaming-search"
      - tapOn: "Local"
      - assertVisible:
          id: "charge-search"
