# Monthly Statement: opening it from Activity renders the sessions as a
# standardized divided list (not per-session cards), and Back returns to Activity.
appId: com.evtivity.driver
name: 32 - Statement
tags:
  - activity
  - statement
  - navigation
---
- runFlow: ../subflows/session.yaml
- tapOn:
    id: 'tab-activity'
- assertVisible: 'Activity'
# open the monthly statement from the Activity entry card
- scrollUntilVisible:
    element:
      id: 'activity-statement'
    direction: DOWN
- tapOn:
    id: 'activity-statement'
# the statement screen opened
- assertVisible: 'Statement'
# a session renders as a row in the standardized list
- scrollUntilVisible:
    element:
      id: 'statement-row-.*'
    direction: DOWN
- assertVisible:
    id: 'statement-row-.*'
# Back returns to Activity
- tapOn:
    id: 'back-button'
- assertVisible: 'Activity'
