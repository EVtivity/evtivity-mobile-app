# Activity tab: month prev/next navigation, all three metric segments, and the
# monthly-statement card is reachable.
appId: com.evtivity.driver
name: 31 - Activity
tags:
  - activity
  - navigation
---
- runFlow: ../subflows/session.yaml
- tapOn:
    id: "tab-activity"
- assertVisible: "Activity"
# month navigation
- tapOn:
    id: "activity-prev-month"
- tapOn:
    id: "activity-next-month"
# metric segments
- tapOn: "Energy"
- tapOn: "Distance"
- tapOn: "Cost"
# the monthly statement entry is present
- scrollUntilVisible:
    element:
      id: "activity-statement"
    direction: DOWN
- assertVisible:
    id: "activity-statement"
