# Support: open from Account, the New Case form (subject + description field
# entry, submit enable/disable validation). The category picker is a Sheet (modal
# gap) and submitting creates a case (mutation), so neither is executed.
appId: com.evtivity.driver
name: 41 - Support
tags:
  - support
  - forms
---
- runFlow: ../subflows/session.yaml
- tapOn:
    id: 'tab-account'
- scrollUntilVisible:
    element:
      id: 'account-row-support'
    direction: DOWN
- tapOn:
    id: 'account-row-support'
- assertVisible: 'Support'
- assertVisible: 'New Case'
# open a case's detail when one exists, then return
- runFlow:
    when:
      visible:
        id: 'support-case-.*'
    commands:
      - tapOn:
          id: 'support-case-.*'
      - assertVisible:
          id: 'back-button'
      - tapOn:
          id: 'back-button'
      - assertVisible: 'Support'
# new case form
- tapOn: 'New Case'
- assertVisible:
    id: 'support-subject'
- assertVisible:
    id: 'support-submit'
    enabled: false
- tapOn:
    id: 'support-subject'
- inputText: 'E2E subject'
- hideKeyboard
- tapOn:
    id: 'support-description'
- inputText: 'E2E description'
- hideKeyboard
- assertVisible:
    id: 'support-submit'
    enabled: true
- tapOn:
    id: 'back-button'
- assertVisible: 'Support'
