# EVSE detail (deep-link to a specific connector): content, the Start button is
# present, and View Location opens the location screen. Start is not pressed
# (real OCPP side effect — documented gap).
appId: com.evtivity.driver
name: 22 - Charge EVSE detail
tags:
  - charge
---
- runFlow: ../subflows/session.yaml
# evseId is a query param on the station route, not a path segment.
- openLink: com.evtivity.driver://charge/CS-0001?evseId=1
- assertVisible: "CS-0001"
- assertVisible: "Start Charging"
# view location (tap the address row) opens the location screen
- tapOn:
    id: "station-location"
- assertVisible:
    id: "back-button"
- tapOn:
    id: "back-button"
- assertVisible: "Start Charging"
